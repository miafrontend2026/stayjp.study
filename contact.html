<style>
/* == Theme Variables == */
:root {
  --bg: #FAF9F6;
  --bg2: #FFFFFF;
  --bg3: #F3F1ED;
  --tx: #2C2C2C;
  --tx2: #7A7A7A;
  --tx3: #ACACAC;
  --ac: #D4654A;
  --ac2: #4A7FD4;
  --bd: #E8E5E0;
  --sh: 0 1px 3px rgba(0,0,0,.03);
  --r: 14px;
  --hh: 48px;
  --ease: cubic-bezier(.25,.1,.25,1);
}
[data-theme="dark"] {
  --bg: #1C1C1E;
  --bg2: #2C2C2E;
  --bg3: #242426;
  --tx: #E5E5E5;
  --tx2: #8E8E93;
  --tx3: #636366;
  --ac: #E8734A;
  --ac2: #6BA8F5;
  --bd: #3A3A3C;
  --sh: none;
}
*{margin:0;padding:0;box-sizing:border-box;
  transition: color .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "PingFang TC", system-ui, sans-serif;
  background: var(--bg); color: var(--tx);
  line-height: 1.7; font-size: 16px;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}
a { color: var(--ac2); text-decoration: none; }
a:hover { text-decoration: underline; }

/* == Header == */
.hd {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg); z-index: 100;
  border-bottom: 1px solid var(--bd);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
}
.hd-inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center;
  padding: 0 20px; height: var(--hh); gap: 12px;
}
.hd h1 {
  color: var(--tx); font-size: 17px; font-weight: 800;
  white-space: nowrap; letter-spacing: -.3px;
}
.hd-links { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.hd-links a {
  color: var(--tx2); text-decoration: none; font-size: 13px;
  padding: 5px 12px; border-radius: 20px; font-weight: 500;
  transition: all .2s var(--ease); white-space: nowrap;
  background: var(--bg3);
}
.hd-links a:hover { color: var(--ac); background: var(--bg2); text-decoration: none; }
.theme-btn {
  background: none; border: none; cursor: pointer;
  color: var(--tx3); padding: 6px;
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  transition: color .2s var(--ease), background .2s var(--ease);
  flex-shrink: 0;
}
.theme-btn:hover { color: var(--tx); background: var(--bg3); }
.theme-btn svg { width: 18px; height: 18px; }

/* Language toggle */
.lang-btn {
  background: var(--bg3); border: 1px solid var(--bd); cursor: pointer;
  color: var(--tx2); padding: 2px 8px; font-size: 11px; font-weight: 600;
  border-radius: 8px; font-family: inherit; white-space: nowrap;
  transition: color .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
}
.lang-btn:hover { color: var(--ac); border-color: var(--ac); }

/* == Main == */
.main {
  max-width: 640px; margin: 0 auto;
  padding: calc(var(--hh) + 48px) 20px 80px;
}
.main h2 {
  font-size: 26px; font-weight: 800; letter-spacing: -.3px;
  margin-bottom: 8px;
}
.main .subtitle {
  color: var(--tx2); font-size: 15px; margin-bottom: 36px;
}

/* == Cards == */
.card {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: var(--r); padding: 24px;
  margin-bottom: 16px;
  transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
}
.card:hover { border-color: var(--ac2); box-shadow: var(--sh); }
[data-theme="dark"] .card:hover { box-shadow: none; }
.card-title {
  font-size: 17px; font-weight: 700; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.card-title svg { width: 20px; height: 20px; stroke: var(--ac2); fill: none; stroke-width: 1.5; flex-shrink: 0; }
.card-desc {
  font-size: 14px; color: var(--tx2); line-height: 1.7; margin-bottom: 14px;
}
.card-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 600; color: var(--ac2);
}
.card-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

/* == Form == */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 14px; font-weight: 600;
  margin-bottom: 6px; color: var(--tx);
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--bd);
  border-radius: 10px; font-size: 15px; color: var(--tx);
  font-family: inherit; line-height: 1.6;
  transition: border-color .2s var(--ease);
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--ac2);
}
.form-group textarea { resize: vertical; min-height: 120px; }
.form-group select { cursor: pointer; -webkit-appearance: none; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%237A7A7A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 14px center;
  padding-right: 36px;
}
.submit-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--ac); color: #fff;
  padding: 12px 28px; border-radius: 24px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit;
  transition: transform .2s var(--ease), opacity .2s var(--ease);
}
.submit-btn:hover { transform: translateY(-1px); opacity: .9; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.form-note { font-size: 12px; color: var(--tx3); margin-top: 8px; }
.success-msg {
  display: none; padding: 16px; background: #dcfce7; color: #166534;
  border-radius: 10px; font-size: 14px; font-weight: 500; margin-top: 16px;
}
[data-theme="dark"] .success-msg { background: #14532d33; color: #86efac; }

/* == Footer == */
.ft {
  padding: 40px 20px; text-align: center; color: var(--tx3);
  font-size: 12px; border-top: 1px solid var(--bd);
  background: var(--bg); line-height: 1.9;
}
.ft a { color: var(--ac2); }
.ft-links { display: flex; gap: 16px; justify-content: center; margin-top: 12px; }

@media(max-width:768px) {
  .main { padding: calc(var(--hh) + 32px) 16px 56px; }
  .main h2 { font-size: 22px; }
}
@media(max-width:480px) {
  .hd h1 { font-size: 15px; }
  .hd-links a { font-size: 12px; padding: 4px 10px; }
}
</style>

<header class="hd">
  <div class="hd-inner">
    <h1><a href="home.html" style="color:inherit;text-decoration:none">日本再留計劃</a></h1>
    <div class="hd-links">

      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="切換深色模式"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg></button>

<main class="main">
  <h2>意見回饋</h2>

    </div>
    <div class="card-desc">說明你遇到的問題或建議，我會盡快看到。</div>
    <!-- 未登入提示 -->
    <div id="loginPrompt" style="display:none;padding:20px;background:var(--bg3);border-radius:10px;text-align:center">
      <div style="color:var(--tx2);font-size:14px;margin-bottom:12px">請先以 Google 帳號登入才能留言</div>

    <!-- 表單 -->
    <form id="contactForm" onsubmit="return submitForm(event)" style="display:none">
      <div id="userInfo" style="font-size:12px;color:var(--tx2);margin-bottom:12px">以 <span id="userEmail"></span> 身分留言 · <a href="#" onclick="signOut();return false" style="color:var(--ac)">登出</a></div>
      <div class="form-group">
        <label for="ftype">類型</label>
        <select id="ftype" name="type" required>
          <option value="">請選擇</option>
          <option value="bug">Bug 回報</option>
          <option value="feature">功能建議</option>
          <option value="content">內容錯誤（單字/文法）</option>
          <option value="other">其他</option>

      <div class="form-group">

        <textarea id="fmsg" name="message" placeholder="描述你遇到的問題或想要的功能…" required></textarea>

      <button type="submit" class="submit-btn" id="submitBtn">送出</button>

  <!-- Email -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="i18n.js"></script>
<script>
// ========== I18N (繁/簡切換 via OpenCC runtime 轉換) ==========
const LANG_CYCLE = ['zh-TW', 'zh-CN'];
const LANG_LABEL = { 'zh-TW': '繁', 'zh-CN': '简' };
if (typeof I18n !== 'undefined' && !LANG_CYCLE.includes(I18n.getLang())) I18n.setLang('zh-TW');

let _tw2cn = null;
function ensureOpenCC() {
  return new Promise((resolve) => {
    if (_tw2cn) return resolve(_tw2cn);
    if (window.OpenCC) { _tw2cn = window.OpenCC.Converter({ from: 'tw', to: 'cn' }); return resolve(_tw2cn); }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js';
    s.onload = () => { _tw2cn = window.OpenCC.Converter({ from: 'tw', to: 'cn' }); resolve(_tw2cn); };
    s.onerror = () => resolve(null);
    document.head.appendChild(s);
  });
}

const _origText = new WeakMap();
function collectTextNodes() {
  const nodes = [];
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      const p = n.parentElement;
      if (!p) return NodeFilter.FILTER_REJECT;
      const tag = p.tagName;
      if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'RT') return NodeFilter.FILTER_REJECT;
      if (!n.nodeValue || !/[一-龥]/.test(n.nodeValue)) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  return nodes;
}

// 特別處理 <option> 文字（不是 text node 子元素）
function applyOptionsCvt(toSimplified) {
  document.querySelectorAll('option, input[placeholder], textarea[placeholder]').forEach(el => {
    if (el.tagName === 'OPTION' && el.textContent && /[一-龥]/.test(el.textContent)) {
      if (!_origText.has(el)) _origText.set(el, el.textContent);
      el.textContent = toSimplified && _tw2cn ? _tw2cn(_origText.get(el)) : _origText.get(el);
    }
    if (el.placeholder && /[一-龥]/.test(el.placeholder)) {
      const key = el;
      if (!_origText.has(key)) _origText.set(key, el.placeholder);
      el.placeholder = toSimplified && _tw2cn ? _tw2cn(_origText.get(key)) : _origText.get(key);
    }
  });
}

function applyPageLang() {
  const lang = I18n.getLang();
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = LANG_LABEL[lang] || '繁';
  document.documentElement.lang = lang;
  const toSim = lang === 'zh-CN';
  const nodes = collectTextNodes();
  if (toSim && _tw2cn) {
    nodes.forEach(n => {
      if (!_origText.has(n)) _origText.set(n, n.nodeValue);
      n.nodeValue = _tw2cn(_origText.get(n));
    });
  } else {
    nodes.forEach(n => { if (_origText.has(n)) n.nodeValue = _origText.get(n); });
  }
  applyOptionsCvt(toSim);
}

async function cycleLang() {
  const cur = I18n.getLang();
  const idx = LANG_CYCLE.indexOf(cur);
  const next = LANG_CYCLE[(idx + 1) % LANG_CYCLE.length];
  const btn = document.getElementById('langBtn');
  if (next === 'zh-CN' && !_tw2cn) {
    if (btn) { btn.disabled = true; btn.textContent = '…'; }
    await ensureOpenCC();
    if (btn) btn.disabled = false;
  }
  I18n.setLang(next);
  applyPageLang();
}

(async () => {
  if (I18n.getLang() === 'zh-CN') { await ensureOpenCC(); applyPageLang(); }
  else applyPageLang();
})();

// 頁面 idle 時預載 OpenCC
if ('requestIdleCallback' in window) {
  requestIdleCallback(() => ensureOpenCC(), { timeout: 5000 });
} else {
  setTimeout(() => ensureOpenCC(), 2000);
}

// ========== THEME ==========
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon();
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon();
}
function updateThemeIcon() {
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.innerHTML = isDark
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>';
}
initTheme();

// ========== FIREBASE ==========
const fbConfig = {
  apiKey: "AIzaSyDnmg2XOuvwgE8m8xCF5sS4o0nQYoUplPI",
  authDomain: "jpnote-1bdd6.firebaseapp.com",
  projectId: "jpnote-1bdd6",
  storageBucket: "jpnote-1bdd6.firebasestorage.app",
  messagingSenderId: "666368174384"
};
firebase.initializeApp(fbConfig);
const db = firebase.firestore();
const auth = firebase.auth();
let currentUser = null;

auth.onAuthStateChanged(u => {
  currentUser = u;
  const formEl = document.getElementById('contactForm');
  const promptEl = document.getElementById('loginPrompt');
  if (u) {
    promptEl.style.display = 'none';
    formEl.style.display = '';
    document.getElementById('userEmail').textContent = u.email || u.displayName || '已登入';
  } else {
    promptEl.style.display = '';
    formEl.style.display = 'none';
  }
});

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    alert('登入失敗：' + (err.message || err));
  });
}

function signOut() { auth.signOut(); }

// ========== FORM → Firestore ==========
async function submitForm(e) {
  e.preventDefault();
  if (!currentUser) { alert('請先登入'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  const type = document.getElementById('ftype').value;
  const msg = document.getElementById('fmsg').value;

  try {
    await db.collection('feedback').add({
      type,
      message: msg,
      uid: currentUser.uid,
      email: currentUser.email || null,
      displayName: currentUser.displayName || null,
      ua: navigator.userAgent.slice(0, 200),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '送出';
    alert('送出失敗：' + (err.message || err));
  }
}
</script>
