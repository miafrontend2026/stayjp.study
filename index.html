{id:"n4-22",cat:"接続・原因",t:"～ても（逆接條件）",p:"て形＋も",ex:"「即使～也…」。",eg:[{j:"体調が悪く<em>ても</em>、試合に出ます。",z:"即使身體不舒服也要出賽。"},{j:"何度読ん<em>でも</em>、意味がわかりません。",z:"讀了好幾次還是不懂意思。"}]},
{id:"n4-23",cat:"アスペクト",t:"～てみます（嘗試）",p:"て形＋みます",ex:"「試著做看看」。",eg:[{j:"新しいカフェに行っ<em>てみます</em>。",z:"去那家新咖啡店看看。"},{j:"一度この方法を試し<em>てみてください</em>。",z:"請試試看這個方法。"}]},
{id:"n4-24",cat:"アスペクト",t:"～てしまいます（完結・遺憾）",p:"て形＋しまいます",ex:"①完全做完 ②不小心做了（遺憾）。口語：ちゃう。",eg:[{j:"連続ドラマを一晩で見<em>てしまいました</em>。",z:"一個晚上就把連續劇看完了。"},{j:"ノートを電車に忘れ<em>てしまいました</em>。",z:"不小心把筆記本忘在電車上了。"}]},
{id:"n4-25",cat:"アスペクト",t:"～ておきます（事前準備）",p:"て形＋おきます",ex:"「事先做好」或「維持原狀」。",eg:[{j:"出張の前に切符を買っ<em>ておきます</em>。",z:"出差前先買好票。"},{j:"食器は流しに置い<em>ておいてください</em>。",z:"餐具請放在流理台。"}]},
{id:"n4-26",cat:"アスペクト",t:"～てきます・～ていきます",p:"て形＋きます（來向）／て形＋いきます（去向）",ex:"表示動作方向、時間推移的變化。",eg:[{j:"街の雰囲気が変わっ<em>てきました</em>。",z:"街的氛圍逐漸變了（到現在）。"},{j:"これから物価はもっと上がっ<em>ていきます</em>。",z:"今後物價會越來越高。"}]},
{id:"n4-27",cat:"アスペクト",t:"～はじめます・～続けます・～終わります",p:"ます形（去ます）＋はじめる／続ける／終わる",ex:"表示動作的開始、持續、結束。",eg:[{j:"風が吹き<em>はじめました</em>。",z:"開始吹風了。"},{j:"5キロ走り<em>続けました</em>。",z:"持續跑了 5 公里。"}]},
{id:"n4-28",cat:"アスペクト",t:"～ところです（動作階段）",p:"辞書形ところ（即將）／ているところ（正在）／たところ（剛完成）",ex:"表示動作進行的不同階段。",eg:[{j:"これから会議に出る<em>ところです</em>。",z:"正要去開會。"},{j:"今、お風呂に入っている<em>ところです</em>。",z:"正在洗澡。"},{j:"ちょうど駅に着いた<em>ところです</em>。",z:"剛到車站。"}]},
{id:"n4-29",cat:"アスペクト",t:"～たばかりです",p:"た形＋ばかりです",ex:"「剛做完～」。強調時間過不久。",eg:[{j:"この会社に入っ<em>たばかりです</em>。",z:"剛進這家公司。"},{j:"さっき歯を磨い<em>たばかりです</em>。",z:"剛刷完牙。"}]},
{id:"n4-30",cat:"授受表現",t:"～てあげます・てもらいます・てくれます",p:"て形＋あげる（幫人做）／もらう（請人做）／くれる（人幫我做）",ex:"行為的授受。表示「做某事」的施予和接受。",eg:[{j:"後輩にアドバイスし<em>てあげました</em>。",z:"給後輩建議了。"},{j:"同僚に書類を直し<em>てもらいました</em>。",z:"請同事幫忙改了文件。"},{j:"姉がマフラーを編ん<em>でくれました</em>。",z:"姐姐織了圍巾給我。"}]},
{id:"n4-31",cat:"推量・様態",t:"～そうです（様態推量）",p:"ます形（去ます）＋そうです／い形（去い）＋そう／な形＋そう",ex:"「看起來好像要～」。根據外觀的推測。",eg:[{j:"台風が来<em>そうです</em>。",z:"颱風好像要來了。"},{j:"あのスープは熱<em>そうです</em>。",z:"那碗湯看起來很燙。"}],n:"例外：いい→よさそう、ない→なさそう。"},
{id:"n4-32",cat:"推量・様態",t:"～そうです（伝聞）",p:"普通形＋そうです",ex:"「聽說～」。傳達從別處聽來的資訊。",eg:[{j:"新社長は厳しい<em>そうです</em>。",z:"聽說新社長很嚴格。"},{j:"来週のコンサートは中止だ<em>そうです</em>。",z:"聽說下週的演唱會取消了。"}]},
{id:"n4-33",cat:"推量・様態",t:"～ようです・～みたいです",p:"普通形＋ようです（較正式）／みたいです（口語）",ex:"「好像是～」。根據觀察的推測。みたい較口語。",eg:[{j:"隣の家は引っ越した<em>ようです</em>。",z:"隔壁家好像搬走了。"},{j:"昨夜、地震があった<em>みたいです</em>。",z:"昨晚好像有地震。"}]},
{id:"n4-34",cat:"推量・様態",t:"～らしいです",p:"普通形＋らしいです",ex:"①「聽說～」（傳聞推測） ②「很有～風格」（典型）。",eg:[{j:"中村さんは転職する<em>らしいです</em>。",z:"聽說中村要換工作。"},{j:"彼女は本当に芸術家<em>らしい</em>人です。",z:"她真是個很有藝術家風格的人。"}]},
{id:"n4-35",cat:"推量・様態",t:"～はずです",p:"普通形＋はずです",ex:"「應該是～」。基於根據的推斷。",eg:[{j:"予約した時刻にはもう席が確保されている<em>はずです</em>。",z:"預約時間到應該已經保留座位了。"},{j:"あんなに準備した人が失敗する<em>はずがありません</em>。",z:"準備那麼充分的人不可能失敗。"}]},
{id:"n4-36",cat:"推量・様態",t:"～でしょう・～だろう",p:"普通形＋でしょう（丁寧）／だろう（普通）",ex:"推測「大概」或確認「對吧」。だろう是普通體。",eg:[{j:"週末は気温が下がる<em>でしょう</em>。",z:"週末氣溫大概會下降。"},{j:"あのレストランは人気<em>だろう</em>。",z:"那家餐廳大概很受歡迎吧。"}]},
{id:"n4-37",cat:"比較",t:"～より…ほうが",p:"BよりAのほうが＋形容詞",ex:"「比起B，A更…」。",eg:[{j:"普通列車より特急の<em>ほうが</em>快適です。",z:"比起普通列車，特急更舒適。"},{j:"都会より田舎の<em>ほうが</em>落ち着きます。",z:"比起都市，鄉下更讓人放鬆。"}]},
{id:"n4-38",cat:"比較",t:"～ほど…ない",p:"AはBほど＋形容詞否定",ex:"「A沒有B那麼…」。",eg:[{j:"京都は東京<em>ほど</em>人が多くないです。",z:"京都沒東京人那麼多。"},{j:"この冬は去年<em>ほど</em>寒くないです。",z:"今年冬天沒去年那麼冷。"}]},
{id:"n4-39",cat:"比較",t:"～でいちばん（最上級）",p:"範圍＋で＋いちばん＋形容詞",ex:"「在～中最…」。",eg:[{j:"アジア<em>で</em>いちばん長い川は何ですか。",z:"亞洲最長的河是哪條？"},{j:"家族<em>で</em>いちばん料理が上手なのは母です。",z:"家裡最會做菜的是媽媽。"}]},
{id:"n4-40",cat:"引用・思考",t:"～と言います",p:"普通形＋と言います",ex:"引用說話內容。直接引用或間接引用。",eg:[{j:"部長は「来月から新制度が始まる」<em>と言いました</em>。",z:"部長說「下個月開始有新制度」。"},{j:"同僚は風邪をひいた<em>と言いました</em>。",z:"同事說感冒了。"}]},
{id:"n4-41",cat:"引用・思考",t:"～と思います",p:"普通形＋と思います",ex:"「我覺得、我認為」。表示意見或推測。",eg:[{j:"彼の提案は妥当だ<em>と思います</em>。",z:"我覺得他的提案合理。"},{j:"このデザインはセンスがいい<em>と思います</em>。",z:"我覺得這個設計有品味。"}]},
{id:"n4-42",cat:"引用・思考",t:"～うと思います（意志）",p:"意向形＋と思います",ex:"「我想要做～」。表示打算。",eg:[{j:"今年こそ資格試験に挑戦しよう<em>と思います</em>。",z:"今年決定要挑戰證照考試。"},{j:"在宅勤務を申請しよう<em>と思っています</em>。",z:"正在考慮申請在家工作。"}]},
{id:"n4-43",cat:"引用・思考",t:"～か（どうか）（間接疑問）",p:"普通形＋か（どうか）",ex:"間接問句。「是否～」「是不是～」。",eg:[{j:"パーティーに参加できる<em>かどうか</em>まだ決まっていません。",z:"還沒決定能不能參加派對。"},{j:"週末に空き時間がある<em>か</em>確認してください。",z:"請確認週末有沒有空。"}]},
{id:"n4-44",cat:"引用・思考",t:"～がります（第三人稱慾望）",p:"い形（去い）＋がります",ex:"描述第三人稱的慾望或情感。",eg:[{j:"弟が新しいゲーム機を<em>欲しがっています</em>。",z:"弟弟想要新遊戲機。"},{j:"姪は海外で働き<em>たがっています</em>。",z:"姪女想在國外工作。"}]},
{id:"n4-45",cat:"表現・文型",t:"～んです・～のです",p:"普通形＋んです（な形/名詞：な＋んです）",ex:"強調説明、追問原因。口語常用。",eg:[{j:"顔色が悪い<em>んですか</em>。",z:"你臉色不好？"},{j:"実は転職する<em>んです</em>。",z:"其實我要換工作了。"}]},
{id:"n4-46",cat:"表現・文型",t:"～なさい（命令指示）",p:"ます形（去ます）＋なさい",ex:"較溫和的命令。父母對小孩、老師對學生。",eg:[{j:"宿題を先に<em>やりなさい</em>。",z:"先去做作業。"},{j:"手をちゃんと<em>洗いなさい</em>。",z:"把手洗乾淨。"}]},
{id:"n4-47",cat:"表現・文型",t:"～ことになります・～ことにします",p:"辞書形＋ことになる（被決定）／ことにする（自己決定）",ex:"なる＝外部決定。する＝主動決定。",eg:[{j:"来月から沖縄支社に異動する<em>ことになりました</em>。",z:"決定下個月調到沖繩分公司。（公司決定）"},{j:"間食をやめる<em>ことにしました</em>。",z:"決定不再吃零食。（自己決定）"}]},
{id:"n4-48",cat:"表現・文型",t:"～まま（狀態保持）",p:"た形＋まま／ない形＋まま／名詞の＋まま",ex:"「保持～的狀態」。",eg:[{j:"眼鏡をかけた<em>まま</em>シャワーを浴びてしまいました。",z:"戴著眼鏡就沖了澡。"},{j:"ドアを開けた<em>まま</em>出かけてしまいました。",z:"門開著就出門了。"}]},
{id:"n4-49",cat:"表現・文型",t:"～ばかり（偏重）",p:"動詞て形＋ばかりいる",ex:"「老是在做～」。帶有批評語氣。",eg:[{j:"漫画<em>ばかり</em>読んでいないで、勉強しなさい。",z:"不要老是看漫畫，去讀書。"},{j:"外食<em>ばかり</em>しています。",z:"老是在外面吃。"}]},
{id:"n4-50",cat:"表現・文型",t:"～場合（條件假定）",p:"普通形＋場合（な形/名詞：の＋場合）",ex:"「在～的情況下」。比たら更正式。",eg:[{j:"地震の<em>場合</em>は机の下に隠れてください。",z:"發生地震請躲到桌下。"},{j:"問題が発生した<em>場合</em>は管理者に連絡してください。",z:"出問題時請聯絡管理員。"}]},
{id:"n4-51",cat:"動詞活用",t:"意向形",p:"五段：う段→おう段／一段：去る＋よう",ex:"「做～吧」。普通體的勸誘。する→しよう、来る→来よう。",eg:[{j:"新しい店を<em>試そう</em>。",z:"試試看新開的店吧。"},{j:"皆で<em>乾杯しよう</em>。",z:"大家一起乾杯吧。"}]},
{id:"n4-52",cat:"動詞活用",t:"可能形",p:"五段：う段→え段＋る／一段：去る＋られる",ex:"「能夠做～」。が標示能力對象。口語：一段常省「ら」。",eg:[{j:"韓国語が<em>書けます</em>。",z:"會寫韓語。"},{j:"生卵が<em>食べられます</em>。",z:"敢吃生雞蛋。"}]},
{id:"n4-53",cat:"動詞活用",t:"命令形・禁止形",p:"命令形：五段え段／禁止形：辞書形＋な",ex:"命令形＝直接命令。禁止形＝「不准～」。語氣很強。",eg:[{j:"早く<em>走れ</em>！",z:"快跑！"},{j:"この部屋に入る<em>な</em>！",z:"不准進這間房！"}]},
{id:"n4-54",cat:"動詞活用",t:"条件形（ば形）",p:"五段：う段→え段＋ば／一段：去る＋れば",ex:"「如果～的話」。假定條件。",eg:[{j:"予定が合え<em>ば</em>、お茶でも飲みましょう。",z:"如果時間配合就一起喝個茶吧。"},{j:"安けれ<em>ば</em>買います。",z:"如果便宜就買。"}]},
{id:"n4-55",cat:"條件表現",t:"～たら（條件）",p:"た形＋ら",ex:"「如果～了的話」。最通用的條件句。也可表示意外發現。",eg:[{j:"電車が来<em>たら</em>、すぐ乗ってください。",z:"電車來了就馬上上車。"},{j:"ドアを開け<em>たら</em>、手紙が落ちていました。",z:"開門一看，有封信掉在地上。"}]},
{id:"n4-56",cat:"條件表現",t:"助詞「なら」（條件）",p:"普通形＋なら",ex:"「如果你說的是～的話」。接話題做建議。",eg:[{j:"温泉に行く<em>なら</em>、箱根がおすすめですよ。",z:"如果要去泡溫泉，推薦箱根。"},{j:"家賃が予算内<em>なら</em>、契約したいです。",z:"如果房租在預算內就想簽約。"}]},
{id:"n4-57",cat:"條件表現",t:"接続助詞「と」（恆常條件）",p:"辞書形＋と",ex:"「一做A就會B」。自然法則、習慣、機器操作。",eg:[{j:"夜になる<em>と</em>、街の灯りがつきます。",z:"一到晚上街燈就亮。"},{j:"この鍵を回す<em>と</em>、金庫が開きます。",z:"轉這把鑰匙保險箱就會開。"}]},
{id:"n4-58",cat:"條件表現",t:"～たら／ば／といいです（建議・願望）",p:"たら／ば／と＋いいです",ex:"建議「做～就好了」或願望「希望～」。",eg:[{j:"医者に相談し<em>たらいいですよ</em>。",z:"跟醫生談談就好了啊。"},{j:"新店舗がオープンする<em>といいですね</em>。",z:"新店能開就好了呢。"}]},
{id:"n4-59",cat:"動詞活用",t:"受身形（被動）",p:"五段：あ段＋れる／一段：去る＋られる",ex:"「被做～」。直接被動、間接被動（迷惑被動）。",eg:[{j:"課長に提案を<em>認められました</em>。",z:"提案被課長認可了。"},{j:"駅で財布を<em>すられました</em>。",z:"在車站錢包被扒了。"}]},
{id:"n4-60",cat:"動詞活用",t:"使役形",p:"五段：あ段＋せる／一段：去る＋させる",ex:"「讓某人做～」。強制或允許。",eg:[{j:"先生は生徒に作文を書か<em>せます</em>。",z:"老師讓學生寫作文。"},{j:"店長はアルバイトを早く帰ら<em>せました</em>。",z:"店長讓打工族提早下班。"}]},
{id:"n4-61",cat:"動詞活用",t:"使役受身形",p:"五段：あ段＋される／一段：去る＋させられる",ex:"「被迫做～」。不情願地被要求。",eg:[{j:"毎週会議で発表<em>させられます</em>。",z:"每週被要求在會議報告。"},{j:"子供の頃、苦手なピーマンを食べ<em>させられました</em>。",z:"小時候被逼著吃不敢吃的青椒。"}]},
{id:"n4-62",cat:"敬語",t:"尊敬語",p:"お＋ます形＋になります／特別尊敬語",ex:"抬高對方行為。特別尊敬語：いらっしゃいます、おっしゃいます、ご覧になります等。",eg:[{j:"部長は何時に<em>お戻りになりますか</em>。",z:"部長幾點回來？"},{j:"先生は何と<em>おっしゃっていましたか</em>。",z:"老師怎麼說？"}]},
{id:"n4-63",cat:"敬語",t:"謙譲語",p:"お＋ます形＋します／特別謙譲語",ex:"降低自己行為。特別謙譲語：参ります、申します、拝見します等。",eg:[{j:"荷物は私が<em>お預かりします</em>。",z:"行李我來保管。"},{j:"来週の打合せに<em>参ります</em>。",z:"下週會議我會去。"}]},
{id:"n4-64",cat:"敬語",t:"～させていただきます",p:"使役形て＋いただきます",ex:"「請允許我做～」。非常禮貌的請求許可。",eg:[{j:"明日は有給を<em>取らせていただきます</em>。",z:"明天請讓我休有薪假。"},{j:"資料を<em>配布させていただきます</em>。",z:"讓我發放資料。"}]},
{id:"n4-65",cat:"敬語",t:"敬語整理（お/ご・ございます）",p:"お＋和語／ご＋漢語（美化語）",ex:"お名前、ご住所等。ございます＝あります的敬語。",eg:[{j:"<em>ご</em>予約は何時ですか。",z:"請問幾點預約？"},{j:"何か<em>ございます</em>か。",z:"有什麼事嗎？"}]},
{id:"n4-66",cat:"口語・助詞",t:"縮約表現（口語）",p:"ている→てる、ておく→とく、てしまう→ちゃう",ex:"日常口語中的縮略形。",eg:[{j:"何を<em>見てる</em>の？",z:"在看什麼啊？（＝見ている）"},{j:"切符を落とし<em>ちゃった</em>。",z:"把票弄丟了。（＝てしまった）"}]},
{id:"n4-67",cat:"口語・助詞",t:"助詞「でも」（全面肯定）",p:"疑問詞＋でも",ex:"「不管～都…」。全面肯定。",eg:[{j:"<em>どこでも</em>勉強できます。",z:"在哪裡都能讀書。"},{j:"<em>いつでも</em>連絡してください。",z:"隨時都可以聯絡我。"}]},
{id:"n4-68",cat:"口語・助詞",t:"助詞「とか」（列舉）",p:"名詞＋とか＋名詞＋とか",ex:"口語的部分列舉。比「や」更隨意。",eg:[{j:"お茶<em>とか</em>お菓子<em>とか</em>を買ってきました。",z:"買了茶啊點心之類的回來。"},{j:"カラオケ<em>とか</em>行きませんか。",z:"要不要去 KTV 之類的？"}]},

const VOCAB_CATS = [
  {name:"名詞",icon:"名",key:"名"},{name:"動詞",icon:"動",key:"動"},
  {name:"い形容詞",icon:"い",key:"い形"},{name:"な形容詞",icon:"な",key:"な形"},

function getVocabData(lv) {
  if(lv==='n5') return typeof VOCAB_N5!=='undefined'?VOCAB_N5:[];
  if(lv==='n4') return typeof VOCAB_N4!=='undefined'?VOCAB_N4:[];
  if(lv==='n3') return typeof VOCAB_N3!=='undefined'?VOCAB_N3:[];
  if(lv==='n2') return typeof VOCAB_N2!=='undefined'?VOCAB_N2:[];
  if(lv==='n1') return typeof VOCAB_N1!=='undefined'?VOCAB_N1:[];

// ========== RENDER VOCAB ==========
function renderVocab() {
  const data = getVocabData(currentLevel);
  const fk = favKey();
  const favList = favorites[fk] || [];
  const mn = document.getElementById('mn');
  const sd = document.getElementById('sd');
  const lf = searchTerm;

  let filtered = data;
  if (lf) filtered = filtered.filter(d => d.w.includes(lf)||d.r.includes(lf)||d.m.includes(lf));
  if (showFavOnly) filtered = filtered.filter(d => favList.includes(d.w));

  // Daily mode: limit to today's batch
  const prog = getDailyProgress(currentLevel);
  if (dailyMode && !lf && !showFavOnly) {
    const start = prog.totalOffset;
    const end = Math.min(start + DAILY_NEW, data.length);
    filtered = data.slice(start, end);
  }

  const groups = {};
  VOCAB_CATS.forEach(c => groups[c.key] = []);
  filtered.forEach(d => { if(groups[d.c]) groups[d.c].push(d); else if(!groups['他']) groups['他']=[d]; else groups['他'].push(d); });

  let h = '';
  if (!lf && !showFavOnly) {
    const lv = currentLevel.toUpperCase();
    const cnt = data.length;
    // Daily progress bar
    h += `<div class="daily-bar">
      <div class="dp"><div class="dp-lbl">${t('total_progress', { lv })}</div><div class="dp-bar"><div class="dp-fill" style="width:${Math.round(prog.totalOffset/cnt*100)}%"></div></div>
      <div class="dp-txt">${t('progress_txt', { n: prog.totalOffset, total: cnt })}</div></div>
      <button class="daily-btn ${dailyMode?'on':''}" onclick="toggleDailyMode()">${dailyMode?t('show_all'):t('daily_mode')}</button>
      <button class="shadow-trigger" onclick="Shadow.startCurrent()">🎧 跟讀本頁</button>
      ${dailyMode?`<div class="daily-batch-row">
        ${prog.totalOffset>0?`<button class="daily-btn" onclick="prevDailyBatch()">${t('prev_batch')}</button>`:''}
        ${prog.totalOffset<cnt?`<button class="daily-btn" onclick="nextDailyBatch()">${t('next_batch')}</button>`:''}
        ${prog.totalOffset>0?`<button class="daily-btn" onclick="resetDailyBatch()" title="${t('reset_progress')}">↺</button>`:''}
      </div>`:''}
    </div>`;
    if (!dailyMode) {
      h += `<div class="intro"><h2>${t('vocab_title', { lv })}</h2><p>${t('vocab_desc', { lv, n: cnt })}</p><div class="tg"><span>JLPT ${lv}</span><span>${t('vocab_tag', { n: cnt })}</span><span>${t('listen_tag')}</span></div></div>`;
    } else {
      const start = prog.totalOffset;
      const end = Math.min(start + DAILY_NEW, cnt);
      h += `<div class="intro"><h2>${t('daily_title', { lv })}</h2><p>${t('daily_desc', { start: start+1, end, count: end-start })}</p><div class="tg"><span>${t('daily_tag', { n: DAILY_NEW })}</span><span>${t('listen_tag')}</span></div></div>`;
    }
  }

  // 從 .vi 的 data-r（平假名讀音）發音，fallback 到 data-w（漢字）
  const spkSvg = '<svg class="spk" onclick="event.stopPropagation();var vi=this.closest(\'.vi\');speak(vi.dataset.r||vi.dataset.w)" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg>';

  // Use virtual list for full list (no search, no daily, no fav filter)
  const useVL = !lf && !showFavOnly && !dailyMode && typeof VirtualList !== 'undefined' && filtered.length > 200;

  if (useVL) {
    // Destroy previous virtual list if active
    VirtualList.destroy();

    // Build flat item array with category headers
    const vlItems = [];
    VOCAB_CATS.forEach(cat => {
      const items = groups[cat.key];
      if (!items || !items.length) return;
      vlItems.push({ type: 'header', cat, count: items.length });
      items.forEach(d => vlItems.push({ type: 'item', d, catName: cat.name }));
    });

    const vc = filtered.length;
    h += `<div id="vl-container"></div>`;
    mn.innerHTML = h;

    const vlContainer = document.getElementById('vl-container');
    VirtualList.init({
      container: vlContainer,
      items: vlItems,
      itemHeight: 100,
      buffer: 15,
      renderItem: (entry) => {
        if (entry.type === 'header') {
          return `<section class="cs"><h2><span class="ci2">${entry.cat.icon}</span>${cvt(entry.cat.name)}<span style="font-size:12px;color:#999;font-weight:400;margin-left:auto">${t('cat_count_vocab', { n: entry.count })}</span></h2></section>`;
        }
        const d = entry.d;
        const isFav = favList.includes(d.w);
        return `<div class="vi" data-fid="${d.w}" data-w="${d.w}" data-r="${d.r||''}"><div class="vl"><div class="vw">${d.w}</div>${d.w!==d.r?`<div class="vr">${d.r}</div>`:''}<div class="vm">${cvt(d.m)}</div></div>${spkSvg}<span class="vp">${cvt(entry.catName)}</span><svg class="star ${isFav?'on':''}" onclick="toggleFav('${d.w.replace(/'/g,"\\'")}')" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>`;
      }
    });

    document.getElementById('stats').textContent = `${vc} / ${data.length}`;
    updateFavCount();
  } else {
    // Destroy virtual list if switching away from full mode
    if (typeof VirtualList !== 'undefined' && VirtualList.isActive()) VirtualList.destroy();

    let vc = 0;
    VOCAB_CATS.forEach(cat => {
      const items = groups[cat.key];
      if (!items||!items.length) return;
      vc += items.length;
      h += `<section class="cs" id="vcat-${cat.key}"><h2><span class="ci2">${cat.icon}</span>${cvt(cat.name)}<span style="font-size:12px;color:#999;font-weight:400;margin-left:auto">${t('cat_count_vocab', { n: items.length })}</span></h2>`;
      h += '<div class="vg">';
      items.forEach(d => {
        const isFav = favList.includes(d.w);
        h += `<div class="vi" data-fid="${d.w}" data-w="${d.w}" data-r="${d.r||''}"><div class="vl"><div class="vw">${d.w}</div>${d.w!==d.r?`<div class="vr">${d.r}</div>`:''}<div class="vm">${cvt(d.m)}</div></div>${spkSvg}<span class="vp">${cvt(cat.name)}</span><svg class="star ${isFav?'on':''}" onclick="toggleFav('${d.w.replace(/'/g,"\\'")}')" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>`;
      });
      h += '</div></section>';
    });

    if (!vc) h += `<div class="nr"><p>${showFavOnly?t('no_fav_vocab'):t('no_result_vocab')}</p></div>`;
    mn.innerHTML = h;
    document.getElementById('stats').textContent = `${vc} / ${data.length}`;
    updateFavCount();
  }

  // Sidebar
  let sh = '';
  VOCAB_CATS.forEach(cat => {
    const items = groups[cat.key];
    if (!items||!items.length) return;
    sh += `<div class="ct" onclick="toggleCat(this)">${cvt(cat.name)} (${items.length})</div><div class="ci" style="max-height:${Math.min(items.length*28,400)}px">`;
    items.slice(0,50).forEach(d => { sh += `<a href="#vcat-${cat.key}" onclick="closeSdMobile()">${d.w} ${d.m}</a>`; });
    if(items.length>50) sh+=`<a href="#vcat-${cat.key}" style="color:var(--ac)" onclick="closeSdMobile()">${t('sidebar_more', { n: items.length-50 })}</a>`;
    sh += '</div>';
  });
  sd.innerHTML = sh;

  // Update footer
  const vocabTotal = (typeof VOCAB_N5!=='undefined'?VOCAB_N5.length:0) + (typeof VOCAB_N4!=='undefined'?VOCAB_N4.length:0) + (typeof VOCAB_N3!=='undefined'?VOCAB_N3.length:0) + (typeof VOCAB_N2!=='undefined'?VOCAB_N2.length:0) + (typeof VOCAB_N1!=='undefined'?VOCAB_N1.length:0);
  document.getElementById('ftInfo').textContent = t('ft_vocab', { lv: currentLevel.toUpperCase(), n: data.length, total: vocabTotal });
}

// ========== RENDER CONFUSABLES ==========
function renderConfuse() {
  const data = typeof CONFUSABLES !== 'undefined' ? CONFUSABLES : [];
  const mn = document.getElementById('mn');
  const sd = document.getElementById('sd');
  const lf = searchTerm;
  const lvFilter = currentLevel; // 'all','n3','n2'

  let filtered = data;
  if (lvFilter !== 'all') filtered = filtered.filter(d => d.level && d.level.toLowerCase().includes(lvFilter));
  if (lf) filtered = filtered.filter(d => d.title.includes(lf) || d.words.some(w => w.w.includes(lf)||w.m.includes(lf)) || (d.tip&&d.tip.includes(lf)));

  let h = '';
  if (!lf) {
    h += `<div class="intro"><h2>${t('confuse_title')}</h2><p>${t('confuse_desc')}</p><div class="tg"><span>${t('confuse_tag', { n: filtered.length })}</span><span>${t('confuse_expand')}</span></div></div>`;
  }

  filtered.forEach(cf => {
    h += '<div class="cf-card" onclick="this.classList.toggle(\'o\')"><div class="cf-hd"><span class="cf-lv">'+cf.level+'</span>'+cvt(cf.title)+'<svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="cf-bd"><div class="cf-words">';
    cf.words.forEach(w => {
      h += '<div class="cf-w"><span class="cfw">'+w.w+'</span><span class="cfm">'+cvt(w.m)+'</span><span class="cfn">'+cvt(w.note)+'</span></div>';
    });
    h += '</div>';
    if (cf.tip) h += '<div class="cf-tip">'+cvt(cf.tip)+'</div>';
    if (cf.eg && cf.eg.length) {
      h += '<div class="cf-eg">';
      cf.eg.forEach(e => {
        const pureJ = e.j.replace(/<[^>]+>/g,'').replace(/'/g,"\\'");
        h += '<div class="ex"><div class="j">'+e.j+'<svg class="ex-spk" onclick="event.stopPropagation();speak(\''+pureJ+'\')" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg></div><div class="z">'+cvt(e.z)+'</div></div>';
      });
      h += '</div>';
    }
    h += '</div></div>';
  });
  if (!filtered.length) h += `<div class="nr"><p>${t('no_result_confuse')}</p></div>`;
  mn.innerHTML = h;
  document.getElementById('stats').textContent = filtered.length + ' 組';

  let sh = '';
  filtered.slice(0, 60).forEach(cf => { sh += '<a href="#" onclick="event.preventDefault();closeSdMobile()">'+cf.title+'</a>'; });
  sd.innerHTML = sh;
  document.getElementById('ftInfo').textContent = t('ft_confuse', { n: data.length });
}

// ========== RENDER GRAMMAR ==========
function getGrammarData(lv) {
  if (lv === 'n5') return { data: N5, cats: CATS_N5 };
  if (lv === 'n4') return { data: N4, cats: CATS_N4 };
  if (lv === 'n3' && typeof N3 !== 'undefined') return { data: N3, cats: CATS_N3 };
  if (lv === 'n2' && typeof N2 !== 'undefined') return { data: N2, cats: CATS_N2 };
  if (lv === 'n1' && typeof N1 !== 'undefined') return { data: N1, cats: CATS_N1 };
  return { data: [], cats: [] };
}

  const gd = getGrammarData(currentLevel);
  const data = gd.data;

  let filtered = data;

      <div class="dp-txt">${t('progress_txt', { n: gProg.totalOffset, total: cnt })}</div></div>
      <button class="daily-btn ${grammarDailyMode?'on':''}" onclick="toggleGrammarDailyMode()">${grammarDailyMode?t('show_all'):t('daily_mode')}</button>

        const pureJ = e.j.replace(/<[^>]+>/g,'').replace(/'/g,"\\'");
        return `<div class="ex"><div class="j">${e.j}<svg class="ex-spk" onclick="event.stopPropagation();speak('${pureJ}')" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg></div><div class="z">${cvt(e.z)}</div></div>`;
      }).join('')}</div>${d.n?`<div class="nt">${cvt(d.n)}</div>`:''}<div class="gm-marks"><button class="gm-btn weak ${WeakGrammar.isWeak(d.id)?'on':''}" data-gid="${d.id}" onclick="event.stopPropagation();WeakGrammar.toggleWeak('${d.id}');this.classList.toggle('on')">✗ 不熟</button><button class="gm-btn known" onclick="event.stopPropagation();WeakGrammar.markKnown('${d.id}');this.parentNode.querySelector('.gm-btn.weak').classList.remove('on')">✓ 我會了</button></div><a class="gc-report" href="${reportUrl}" target="_blank" rel="noopener">${t('report_error')}</a></div></div></div>`;
    });
    h += '</section>';
  });

  if (!vc) h += `<div class="nr"><p>${showFavOnly?t('no_fav_grammar'):t('no_result_grammar')}</p></div>`;
  // Affiliate block on N3+ grammar pages — most relevant audience for italki conversion.
  if (vc && /^n[123]$/.test(currentLevel)) h += renderAffiliateBlock('grammar_' + currentLevel);
  mn.innerHTML = h;
  document.getElementById('stats').textContent = `${vc} / ${data.length}`;
  updateFavCount();
  const grammarTotal = N5.length + N4.length + (typeof N3!=='undefined'?N3.length:0) + (typeof N2!=='undefined'?N2.length:0) + (typeof N1!=='undefined'?N1.length:0);
  document.getElementById('ftInfo').textContent = t('ft_grammar', { total: grammarTotal });

  // Sidebar
  let sh = '';
  cats.forEach(cat => {
    const items = groups[cat.name];
    if (!items||!items.length) return;
    sh += `<div class="ct" onclick="toggleCat(this)">${cvt(cat.name)}</div><div class="ci" style="max-height:${items.length*28}px">`;
    items.forEach(d => { sh += `<a href="#${d.id}" onclick="closeSdMobile()">${d.t}</a>`; });
    sh += '</div>';
  });
  sd.innerHTML = sh;
}

function toggleCat(t){t.classList.toggle('c');t.nextElementSibling.classList.toggle('c')}

// ========== I18N ==========
const LANG_CYCLE = ['zh-TW', 'zh-CN'];
const LANG_LABEL = { 'zh-TW': '繁', 'zh-CN': '简' };

// OpenCC 繁→簡 runtime 轉換（保留單一資料來源）
let _tw2cn = null;
function ensureOpenCC() {
  return new Promise((resolve) => {
    if (_tw2cn) return resolve(_tw2cn);
    if (window.OpenCC) {
      _tw2cn = window.OpenCC.Converter({ from: 'tw', to: 'cn' });
      return resolve(_tw2cn);
    }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js';
    s.onload = () => { _tw2cn = window.OpenCC.Converter({ from: 'tw', to: 'cn' }); resolve(_tw2cn); };
    s.onerror = () => resolve(null);
    document.head.appendChild(s);
  });
}

// cvt(text): 若當前語言是 zh-CN，用 OpenCC 轉繁→簡；否則原樣回傳
// 用於：中文說明/中譯/分類名等非日文內容
function cvt(text) {
  if (!text || I18n.getLang() !== 'zh-CN' || !_tw2cn) return text;
  return _tw2cn(text);
}

function applyI18n() {
  // 移除 EN 支援：若 localStorage 存的是 'en'，強制切回繁中
  if (!LANG_CYCLE.includes(I18n.getLang())) I18n.setLang('zh-TW');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAria));
  });
  document.documentElement.lang = I18n.getLang();
  document.title = t('page_title');
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = LANG_LABEL[I18n.getLang()] || '繁';
}

async function cycleLang() {
  const cur = I18n.getLang();
  const idx = LANG_CYCLE.indexOf(cur);
  const next = LANG_CYCLE[(idx + 1) % LANG_CYCLE.length];
  const btn = document.getElementById('langBtn');
  if (next === 'zh-CN' && !_tw2cn) {
    if (btn) { btn.disabled = true; btn.textContent = '…'; }
    await ensureOpenCC();
    if (btn) btn.disabled = false;
  }
  I18n.setLang(next);
  applyI18n();
  updateAuthUI();
  if (typeof doRender === 'function') doRender();
}

// 若 localStorage 記錄使用者上次選簡中，頁面載入就先把 OpenCC 準備好再 render
if (typeof I18n !== 'undefined' && I18n.getLang() === 'zh-CN') {
  ensureOpenCC().then(() => { if (typeof doRender === 'function') doRender(); });
}

// 頁面 idle 時預載 OpenCC → 點「簡」可瞬間切換
if ('requestIdleCallback' in window) {
  requestIdleCallback(() => ensureOpenCC(), { timeout: 8000 });
} else {
  setTimeout(() => ensureOpenCC(), 3000);
}

// ========== THEME ==========
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon();
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon();
}
function updateThemeIcon() {
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.innerHTML = isDark
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>';
}
initTheme();
applyI18n();

// 一次性清理：舊版 cloud merge bug 造成 word_notebook 同 (w, lv) 累積重複
// 修 key: JSON.stringify(entry) → (w, lv)，並同步回 cloud
(function dedupeNotebook() {
  try {
    const raw = localStorage.getItem('word_notebook');
    if (!raw) return;
    const nb = JSON.parse(raw);
    if (!Array.isArray(nb) || nb.length === 0) return;
    const byKey = new Map();
    nb.forEach(x => {
      if (!x || !x.w) return;
      const key = x.w + '\u0000' + (x.lv || '');
      const prev = byKey.get(key);
      if (!prev || (x.added && prev.added && x.added < prev.added)) byKey.set(key, x);
    });
    const deduped = [...byKey.values()];
    if (deduped.length !== nb.length) {
      localStorage.setItem('word_notebook', JSON.stringify(deduped));
      if (typeof saveAllCloud === 'function') saveAllCloud();
    }
  } catch(e) {}
})();
